name: Build and Release Bing Wallpaper

on:
  release:
    types:
      - created

jobs:
  build:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Install OpenGL and X11 dependencies
        run: sudo apt-get update && sudo apt-get install -y libgl1-mesa-dev xorg-dev


      - name: Run tests
        run: go test -v ./...

      - name: Build Linux binary
        run: |
          mkdir -p dist
          GOOS=linux GOARCH=amd64 go build -o dist/bing-wallpaper

      - name: Upload the binaries
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          tag: ${{ github.ref }}
          file: ./dist/bing-wallpaper
          file_glob: true

