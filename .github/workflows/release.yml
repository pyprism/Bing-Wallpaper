name: Build Release Packages

on:
  release:
    types:
      - created

jobs:
  build:
    name: Build ${{ matrix.label }}
    permissions:
      contents: write
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: linux-x86_64
            runner: ubuntu-latest
          - label: linux-arm64
            runner: ubuntu-24.04-arm   # native ARM64 runner — no cross-compilation
          - label: macos
            runner: macos-14
          - label: windows
            runner: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Display the release tag
        run: echo ${{ github.event.release.tag_name }}

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.8.*'
          cache: true

      - name: Install system packages (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libgl1-mesa-dev \
            libxkbcommon-x11-0 \
            libxcb-icccm4 \
            libxcb-image0 \
            libxcb-keysyms1 \
            libxcb-randr0 \
            libxcb-render-util0 \
            libxcb-xinerama0 \
            libxcb-xfixes0 \
            libxcb-shape0 \
            libxcb-cursor0 \
            fuse \
            libfuse2

      - name: Configure (macOS universal)
        if: runner.os == 'macOS'
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release -DCMAKE_OSX_ARCHITECTURES="arm64;x86_64"

      - name: Configure
        if: runner.os != 'macOS'
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --config Release

      - name: Package (Linux → AppImage)
        if: runner.os == 'Linux'
        shell: bash
        run: |
          curl -L -o /tmp/linuxdeploy https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-$(uname -m).AppImage
          curl -L -o /tmp/linuxdeploy-plugin-qt https://github.com/linuxdeploy/linuxdeploy-plugin-qt/releases/download/continuous/linuxdeploy-plugin-qt-$(uname -m).AppImage
          chmod +x /tmp/linuxdeploy /tmp/linuxdeploy-plugin-qt
          export PATH="/tmp:$PATH"
          bash packaging/linux/package.sh build "${{ github.event.release.tag_name }}"

      - name: Package (macOS → dmg)
        if: runner.os == 'macOS'
        shell: bash
        run: bash packaging/macos/package.sh build "${{ github.event.release.tag_name }}"

      - name: Deploy Qt (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          mkdir build\windeploy
          copy build\Release\bing-wallpaper.exe build\windeploy\
          windeployqt --release build\windeploy\bing-wallpaper.exe

      - name: Package (Windows → Inno Setup installer)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          choco install innosetup -y
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" packaging\windows\installer.iss /DAppVersion=${{ github.event.release.tag_name }} /DSourceDir=build\windeploy

      - name: List packaged artifacts
        shell: bash
        run: ls -l *.dmg *.AppImage *.tar.gz *.exe 2>/dev/null || true

      - name: Upload release assets
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          tag: ${{ github.ref }}
          file: bing-wallpaper-*
          file_glob: true
